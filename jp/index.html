  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- LIFF SDK: brings the mock to life inside LINE.
       Outside LINE (regular browser) the SDK still loads but isLoggedIn() is false,
       so the app falls back to a default mock user — no broken state. -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    (function() {
      var LIFF_ID = '2009881592-781XB87C';
      window.WM_LIFF = { ready: false, profile: null, error: null, inClient: false };
      if (typeof liff === 'undefined') {
        console.warn('[LIFF] SDK script failed to load');
        window.WM_LIFF.error = 'sdk-not-loaded';
        return;
      }
      liff.init({ liffId: LIFF_ID })
        .then(function() {
          window.WM_LIFF.inClient = !!liff.isInClient();
          console.log('[LIFF] init OK', { isLoggedIn: liff.isLoggedIn(), isInClient: window.WM_LIFF.inClient });
          if (liff.isLoggedIn()) {
            return liff.getProfile().then(function(profile) {
              window.WM_LIFF.profile = profile;
              window.WM_LIFF.ready = true;
              console.log('[LIFF] profile', profile);
              window.dispatchEvent(new CustomEvent('liff-ready', { detail: profile }));
            });
          }
          // Not logged in — likely a non-LINE browser opening the URL directly.
          // The app falls back to the default mock user and stays usable.
          window.WM_LIFF.ready = true;
          window.dispatchEvent(new CustomEvent('liff-ready', { detail: null }));
        })
        .catch(function(err) {
          console.warn('[LIFF] init failed — running standalone', err);
          window.WM_LIFF.error = String(err && err.message || err);
          window.WM_LIFF.ready = true;
          window.dispatchEvent(new CustomEvent('liff-ready', { detail: null }));
        });
    })();
  </script>

  <script>
    // Tweak defaults — persisted via host
    window.WM_TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "classic",
      "grain": "on",
      "letterbox": "on"
    }/*EDITMODE-END*/;
  </script>

  <script src="data.js?v=15"></script>
</head>
<body>
  <div class="wm-stage" id="stage">
    <!-- iOS device frame gets inserted here by React -->
    <div id="mount"></div>
  </div>

  <!-- Tweaks panel (shows only when Tweaks mode is on) -->
  <div class="wm-tweaks" id="tweaks">
    <h3>Tweaks</h3>
    <div class="wm-tweaks-row">
      <span>カラーテーマ</span>
      <select id="tw-theme">
        <option value="classic">Classic Green</option>
        <option value="dark">Letterbox Dark</option>
      </select>
    </div>
    <div class="wm-tweaks-row">
      <span>グレイン</span>
      <select id="tw-grain">
        <option value="on">ON</option>
        <option value="off">OFF</option>
      </select>
    </div>
    <div class="wm-tweaks-row">
      <span>レターボックス</span>
      <select id="tw-letterbox">
        <option value="on">ON</option>
        <option value="off">OFF</option>
      </select>
    </div>
  </div>

  <script type="text/babel" src="ui.jsx?v=15"></script>
  <script type="text/babel" src="ios-frame.jsx?v=16"></script>
  <script type="text/babel" src="screens/Shell.jsx?v=17"></script>
  <script type="text/babel" src="screens/LineIntro.jsx?v=16"></script>
  <script type="text/babel" src="screens/Welcome.jsx?v=1"></script>
  <script type="text/babel" src="screens/Swipe.jsx?v=30"></script>
  <script type="text/babel" src="screens/Modals.jsx?v=15"></script>
  <script type="text/babel" src="screens/Daily.jsx?v=15"></script>
  <script type="text/babel" src="screens/Detail.jsx?v=5"></script>
  <script type="text/babel" src="screens/History.jsx?v=2"></script>
  <script type="text/babel" src="screens/Limit.jsx?v=5"></script>

  <script type="text/babel" src="app.jsx?v=32"></script>

  <script type="text/babel" data-presets="react">
    // Host shell — mounts the iOS frame with auto-scale to fit viewport
    function Host() {
      // In embed mode (LP iframe), use scale=1 — LP handles external scaling
      const isEmbed = new URLSearchParams(window.location.search).has('embed');
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        if (isEmbed) return; // no auto-scaling in embed mode
        const update = () => {
          const pad = 40;
          // iOS frame now has 10px bezel on each side → 410×864
          const sx = (window.innerWidth - pad) / 410;
          const sy = (window.innerHeight - pad) / 864;
          setScale(Math.min(sx, sy, 1.2));
        };
        update();
        window.addEventListener('resize', update);
        return () => window.removeEventListener('resize', update);
      }, []);
      return (
        <div style={{
          width: 410 * scale,
          height: 864 * scale,
          position: 'relative',
        }}>
          <div style={{
            transform: `scale(${scale})`,
            transformOrigin: 'top left',
            width: 410,
            height: 864,
          }}>
            <IOSDevice width={390} height={844}>
              <div style={{position:'absolute', inset:0}}>
                <App/>
              </div>
            </IOSDevice>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('mount')).render(<Host/>);
  </script>

  <script>
    // Apply tweaks & expose edit-mode protocol
    (function() {
      const stage = document.getElementById('stage');
      const panel = document.getElementById('tweaks');
      function apply(t) {
        const embed = document.body.classList.contains('wm-embed');
        stage.classList.toggle('letterbox', !embed && t.letterbox !== 'off');
        document.body.classList.remove('theme-classic','theme-dark');
        document.body.classList.add('theme-' + (t.theme || 'classic'));
        // grain on cards handled via CSS toggling body class if needed (reserved)
        document.body.classList.toggle('grain-off', t.grain === 'off');
      }
      apply(window.WM_TWEAKS || {});

      function readPanel() {
        return {
          theme: document.getElementById('tw-theme').value,
          grain: document.getElementById('tw-grain').value,
          letterbox: document.getElementById('tw-letterbox').value,
        };
      }
      function writePanel(t) {
        document.getElementById('tw-theme').value = t.theme || 'classic';
        document.getElementById('tw-grain').value = t.grain || 'on';
        document.getElementById('tw-letterbox').value = t.letterbox || 'on';
      }
      writePanel(window.WM_TWEAKS || {});

      ['tw-theme','tw-grain','tw-letterbox'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          const t = readPanel();
          window.WM_TWEAKS = t;
          apply(t);
          window.parent.postMessage({type:'__edit_mode_set_keys', edits: t}, '*');
        });
      });

      // Embed mode: transparent background, no letterbox
      const isEmbed = new URLSearchParams(location.search).has('embed');
      if (isEmbed) {
        document.body.classList.add('wm-embed');
        stage.classList.remove('letterbox');
      }

      window.addEventListener('message', (e) => {
        const d = e.data || {};
        if (d.type === '__activate_edit_mode') panel.classList.add('active');
        if (d.type === '__deactivate_edit_mode') panel.classList.remove('active');
      });
      window.parent.postMessage({type:'__edit_mode_available'}, '*');
    })();
  </script>
</body>
